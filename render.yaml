services:
  - type: web
    name: promptyy
    env: static
    buildCommand: pnpm install --frozen-lockfile && pnpm run build
    publishPath: dist
    routes:
      - type: rewrite
        source: /tools
        destination: /index.html
      - type: rewrite
        source: /world-lab
        destination: /index.html
      - type: rewrite
        source: /write
        destination: /index.html
      - type: rewrite
        source: /about
        destination: /index.html
      - type: rewrite
        source: /*
        destination: /index.html